<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DYChat — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css')}}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
</head>
<body class="login_body">    
    <div class="login_fbody">
        <h2 class="login_title">Login</h2>
        <form action="{{ url_for('login') }}" method="post">
            {% if message %}
                <div class="alert alert-warning">{{ message }}</div>
            {% endif %}
            <div class="form-group">
                <span style="color: white;">Email:</span>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" autocomplete="on">
            </div>
            <div class="form-group">
                <span style="color: white;">Password:</span>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" autocomplete="on">
            </div>    
            <button type="submit" class="btn btn-primary">Login</button>
            <p class="bottom">Don't have an account? <a class="bottom" style="color: #027FDB" href="{{ url_for('register') }}">Register here</a></p>
        </form>
    </div>
</body>
</html>
